services:
  web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./insideout2_output:/app/insideout2_output
      - model_cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    # GPU 사용 시 아래 주석 해제 (NVIDIA Container Toolkit 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  model_cache:
